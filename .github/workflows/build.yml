name: Build DMG

on:
  push:
    branches:
      - '**'
      - '!main'
      - '!gh-pages'
    tags-ignore:
      - 'v*'
      - 'plugin-*'
  pull_request:
    branches: [main]

env:
  SCHEME: DavyWhisper
  PROJECT: DavyWhisper.xcodeproj

jobs:
  release-build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project $PROJECT \
            -scheme $SCHEME

      - name: Build App
        run: |
          set -o pipefail
          xcodebuild -project $PROJECT \
            -scheme $SCHEME \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | tee build.log

      - name: Check First-Party Warnings
        run: bash scripts/check_first_party_warnings.sh build.log

      - name: Install dmgbuild
        run: |
          VENV_DIR="${RUNNER_TEMP}/dmgbuild-venv"
          python3 -m venv "$VENV_DIR"
          source "$VENV_DIR/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install dmgbuild
          echo "$VENV_DIR/bin" >> $GITHUB_PATH

      - name: Create DMG
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          APP_NAME="DavyWhisper"
          DMG_NAME="DavyWhisper-${SHORT_SHA}.dmg"
          APP_PATH="build/Build/Products/Release/DavyWhisper.app"
          SETTINGS="${GITHUB_WORKSPACE}/.github/dmgbuild-settings.py"
          BACKGROUND="${GITHUB_WORKSPACE}/.github/dmg-background.png"

          dmgbuild -s "$SETTINGS" \
            -D app="$APP_NAME" \
            -D app_path="$APP_PATH" \
            -D background="$BACKGROUND" \
            "$APP_NAME" \
            "build/${DMG_NAME}"

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: DavyWhisper-DMG
          path: build/DavyWhisper-*.dmg
          retention-days: 14

  app-tests:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project $PROJECT \
            -scheme $SCHEME

      - name: Run App Tests
        run: |
          set -o pipefail
          xcodebuild test -project $PROJECT \
            -scheme $SCHEME \
            -destination 'platform=macOS,arch=arm64' \
            -parallel-testing-enabled NO \
            -enableCodeCoverage YES \
            -resultBundlePath build/DavyWhisperCodeCoverage.xcresult \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | tee test.log

      - name: Check First-Party Warnings
        run: bash scripts/check_first_party_warnings.sh test.log

      - name: Coverage Gate
        run: python3 scripts/check_coverage.py build/DavyWhisperCodeCoverage.xcresult

  plugin-sdk-tests:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Plugin SDK Tests
        run: swift test --package-path DavyWhisperPluginSDK
