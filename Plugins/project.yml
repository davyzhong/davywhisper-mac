name: DavyWhisperPlugins
options:
  bundleIdPrefix: com.davywhisper
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

packages:
  DavyWhisperPluginSDK:
    path: ../DavyWhisperPluginSDK

targets:
  GLMPlugin:
    type: bundle
    platform: macOS
    sources: [GLMPlugin]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davywhisper.glm
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: GLM
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        WRAPPER_EXTENSION: bundle
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    dependencies:
      - package: DavyWhisperPluginSDK

  KimiPlugin:
    type: bundle
    platform: macOS
    sources: [KimiPlugin]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davywhisper.kimi
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Kimi
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        WRAPPER_EXTENSION: bundle
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    dependencies:
      - package: DavyWhisperPluginSDK

  MiniMaxPlugin:
    type: bundle
    platform: macOS
    sources: [MiniMaxPlugin]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davywhisper.minimax
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: MiniMax
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        WRAPPER_EXTENSION: bundle
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    dependencies:
      - package: DavyWhisperPluginSDK
