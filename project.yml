name: DavyWhisper
options:
  bundleIdPrefix: com.davywhisper
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true

schemes:
  DavyWhisper:
    build:
      targets:
        DavyWhisper: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - DavyWhisperTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  DavyWhisperUITests:
    build:
      targets:
        DavyWhisper: all
        DavyWhisperUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - DavyWhisperUITests
    profile:
      config: Release
    archive:
      config: Release

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    branch: main
  DavyWhisperPluginSDK:
    path: DavyWhisperPluginSDK

targets:
    DavyWhisper:
      type: application
      platform: macOS
      sources:
        - path: DavyWhisper
          excludes:
            - "Resources/ParaformerModel/**"
        - path: DavyWhisper/Resources/ParaformerModel
          type: folder
          buildPhase: resources
        - path: Plugins/WhisperKitPlugin
          excludes:
            - "**/*.xcstrings"
        - path: Plugins/DeepgramPlugin
          excludes:
            - "**/*.xcstrings"
        - path: Plugins/ElevenLabsPlugin
          excludes:
            - "**/*.xcstrings"
        - path: Plugins/LiveTranscriptPlugin
          excludes:
            - "**/*.xcstrings"
        - path: Plugins/OpenAICompatiblePlugin
          excludes:
            - "**/*.xcstrings"
        - path: Plugins/ParaformerPlugin
          excludes:
            - "**/*.xcstrings"
      dependencies:
        - target: davywhisper-cli
          embed: true
        - package: WhisperKit
        - package: FluidAudio
        - package: DavyWhisperPluginSDK
          embed: true
        - framework: Libraries/sherpa-onnx.xcframework
          embed: false
      settings:
        base:
          SWIFT_VERSION: "6.0"
          MACOSX_DEPLOYMENT_TARGET: "14.0"
          SDKROOT: macosx
          DEVELOPMENT_TEAM: "29T9W2PDGP"
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: YES
          CODE_SIGNING_ALLOWED: YES
          GENERATE_INFOPLIST_FILE: NO
          INFOPLIST_FILE: DavyWhisper/Resources/Info.plist
          INFOPLIST_KEY_CFBundleDisplayName: DavyWhisper
          INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
          INFOPLIST_KEY_LSUIElement: YES
          LD_RUNPATH_SEARCH_PATHS:
            - "$(inherited)"
            - "@executable_path/../Frameworks"
            - "@loader_path/../Frameworks"
            - "@executable_path/../../PlugIns"
          OTHER_LDFLAGS:
            - "$(inherited)"
            - "-force_load"
            - "$(PROJECT_DIR)/Libraries/libonnxruntime.a"
          MARKETING_VERSION: 1.1.0
          CURRENT_PROJECT_VERSION: "$(MARKETING_VERSION)"
          PRODUCT_BUNDLE_IDENTIFIER: "com.davywhisper.mac"
          PRODUCT_NAME: DavyWhisper
          SWIFT_EMIT_LOC_STRINGS: YES
          SWIFT_STRICT_CONCURRENCY: targeted
          SWIFT_VERSION: 6.0
          ENABLE_DEBUG_DYLIB: NO
        configs:
          Debug:
            CODE_SIGN_ENTITLEMENTS: DavyWhisper/Resources/DavyWhisper.entitlements
            PRODUCT_BUNDLE_IDENTIFIER: "com.davywhisper.mac.dev"
            SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
            SWIFT_OPTIMIZATION_LEVEL: "-Onone"
            CODE_SIGNING_REQUIRED: NO
          Release:
            CODE_SIGN_ENTITLEMENTS: DavyWhisper/Resources/DavyWhisper.entitlements
            PRODUCT_BUNDLE_IDENTIFIER: "com.davywhisper.mac"
            SWIFT_OPTIMIZATION_LEVEL: "-Owholemodule"
            SWIFT_COMPILATION_MODE: wholemodule

    davywhisper-cli:
      type: tool
      platform: macOS
      sources:
        - path: davywhisper-cli
      settings:
        base:
          SWIFT_VERSION: "6.0"
          MACOSX_DEPLOYMENT_TARGET: "14.0"
          SDKROOT: macosx
          DEVELOPMENT_TEAM: "29T9W2PDGP"
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGNING_ALLOWED: NO
          GENERATE_INFOPLIST_FILE: YES
          PRODUCT_BUNDLE_IDENTIFIER: "com.davywhisper.cli"
          PRODUCT_NAME: davywhisper-cli

    DavyWhisperTests:
      type: bundle.unit-test
      platform: macOS
      sources:
        - path: DavyWhisperTests
      dependencies:
        - target: DavyWhisper
        - package: DavyWhisperPluginSDK
      settings:
        base:
          SWIFT_VERSION: "6.0"
          MACOSX_DEPLOYMENT_TARGET: "14.0"
          SDKROOT: macosx
          DEVELOPMENT_TEAM: "29T9W2PDGP"
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGNING_ALLOWED: NO
          GENERATE_INFOPLIST_FILE: YES
          PRODUCT_BUNDLE_IDENTIFIER: "com.davywhisper.tests"
          TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DavyWhisper.app/Contents/MacOS/DavyWhisper"

    DavyWhisperUITests:
      type: bundle.ui-testing
      platform: macOS
      sources:
        - path: DavyWhisperUITests
      dependencies:
        - target: DavyWhisper
      settings:
        base:
          SWIFT_VERSION: "6.0"
          MACOSX_DEPLOYMENT_TARGET: "14.0"
          SDKROOT: macosx
          DEVELOPMENT_TEAM: "29T9W2PDGP"
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGNING_ALLOWED: NO
          GENERATE_INFOPLIST_FILE: YES
          PRODUCT_BUNDLE_IDENTIFIER: "com.davywhisper.uitests"
